services:
  - type: web
    name: casino-aurelius
    env: node
    region: oregon
    branch: claude/detailed-casino-game-m8fdbg
    buildCommand: npm install && npm run vercel-build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: casino-db
          property: connectionString

databases:
  - name: casino-db
    databaseName: casino
    region: oregon
