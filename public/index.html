<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casino Aurelius</title>
  <meta name="description" content="Provably fair casino — dice, crash, mines, blackjack and more." />
  <meta name="theme-color" content="#0f212e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Casino Aurelius" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ═══════════════════════ AUTH SCREEN ═══════════════════════ -->
  <div id="auth-screen" class="screen">
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="auth-logo-icon">🎰</span>
          <div>
            <div class="auth-logo-name">Casino Aurelius</div>
            <div class="auth-logo-sub">Provably fair · 1,000 chip welcome bonus</div>
          </div>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Log in</button>
          <button class="auth-tab" data-tab="register">Sign up</button>
        </div>

        <form id="login-form" class="auth-form">
          <div class="auth-field">
            <label>Username or email</label>
            <input name="identifier" placeholder="Enter username or email" autocomplete="username" required />
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="auth-submit">Log in</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <div class="auth-field">
            <label>Username</label>
            <input name="username" placeholder="3–20 chars, letters/numbers/_" autocomplete="username" required />
          </div>
          <div class="auth-field">
            <label>Email</label>
            <input name="email" type="email" placeholder="your@email.com" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input name="password" type="password" placeholder="8+ characters" autocomplete="new-password" required />
          </div>
          <button type="submit" class="auth-submit">Create Account &amp; Claim 1,000 🪙</button>
        </form>

        <p id="auth-error" class="auth-error hidden"></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ APP SCREEN ═══════════════════════ -->
  <div id="app-screen" class="screen hidden">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="sidebar-logo-icon">🎰</span>
        <span class="sidebar-logo-text">Casino Aurelius</span>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>

      <div class="sidebar-search">
        <input type="text" id="sidebar-search" placeholder="🔍  Search games…" />
      </div>

      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Populated by JS -->
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-balance">
          <span class="sb-bal-label">Balance</span>
          <span id="balance-amount" class="sb-bal-amount">0 🪙</span>
        </div>
        <div class="sb-level-row">
          <span id="user-level-label" class="sb-level-label">Level 1</span>
          <div class="sb-xp-bar"><div id="xp-fill" class="sb-xp-fill"></div></div>
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main area -->
    <div class="main-area" id="main-area">

      <!-- Top bar -->
      <header class="topbar">
        <button class="topbar-menu" id="menu-toggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>

        <div class="topbar-center" id="topbar-breadcrumb">Casino Aurelius</div>

        <div class="topbar-right">
          <div class="topbar-balance">
            <span class="tb-chips-icon">🪙</span>
            <span id="topbar-balance" class="tb-amount">0</span>
          </div>
          <button id="logout-btn" class="topbar-logout">Log out</button>
        </div>
      </header>

      <!-- Game content -->
      <main id="game-area"></main>
    </div>

    <!-- Toast stack -->
    <div id="toast-stack" class="toast-stack"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/games/limbo.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/plinko.js"></script>
  <script src="js/games/roulette.js"></script>
  <script src="js/games/blackjack.js"></script>
  <script src="js/games/slots.js"></script>
  <script src="js/games/crash.js"></script>
  <script src="js/games/coinflip.js"></script>
  <script src="js/games/keno.js"></script>
  <script src="js/games/wheel.js"></script>
  <script src="js/games/baccarat.js"></script>
  <script src="js/games/hilo.js"></script>
  <script src="js/games/videopoker.js"></script>
  <script src="js/games/chipshop.js"></script>
  <!-- Multiplayer games -->
  <script src="js/games/jackpot.js"></script>
  <script src="js/games/horserace.js"></script>
  <script src="js/games/battledice.js"></script>
  <script src="js/games/rps.js"></script>
  <script src="js/games/raffle.js"></script>
  <script src="js/games/bingo.js"></script>
  <script src="js/games/tower.js"></script>
  <script src="js/games/multiroulette.js"></script>
  <script src="js/games/poker.js"></script>
  <!-- NFTs & Trading -->
  <script src="js/games/nfts.js"></script>
  <script src="js/games/nftmarket.js"></script>
  <!-- How to Play (multilanguage) -->
  <script src="js/howToPlay.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
