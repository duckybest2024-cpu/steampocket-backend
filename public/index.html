<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casino Aurelius</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="auth-screen" class="screen">
    <div class="auth-card">
      <h1>🎰 Casino Aurelius</h1>
      <p class="subtitle">Provably-fair games. Play money. 1,000 chip welcome bonus.</p>

      <div class="tabs">
        <button class="tab active" data-tab="login">Log in</button>
        <button class="tab" data-tab="register">Sign up</button>
      </div>

      <form id="login-form" class="auth-form">
        <input name="identifier" placeholder="Username or email" autocomplete="username" required />
        <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
        <button type="submit">Log in</button>
      </form>

      <form id="register-form" class="auth-form hidden">
        <input name="username" placeholder="Username (3-20 chars, letters/numbers/_)" autocomplete="username" required />
        <input name="email" type="email" placeholder="Email" autocomplete="email" required />
        <input name="password" type="password" placeholder="Password (8+ chars)" autocomplete="new-password" required />
        <button type="submit">Create account &amp; claim 1,000 chips 🪙</button>
      </form>

      <p id="auth-error" class="error hidden"></p>
    </div>
  </div>

  <div id="app-screen" class="screen hidden">
    <header class="topbar">
      <div class="brand">🎰 Casino Aurelius</div>
      <nav id="game-nav" class="game-nav"></nav>
      <div class="account">
        <div class="balance">
          <span class="label">Chips 🪙</span>
          <span id="balance-amount" class="amount">0</span>
        </div>
        <div class="level">
          <span class="label">Lvl <span id="user-level">1</span></span>
          <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
        </div>
        <button id="logout-btn" class="ghost-btn">Log out</button>
      </div>
    </header>

    <main id="game-area"></main>

    <div id="toast-stack" class="toast-stack"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/games/limbo.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/plinko.js"></script>
  <script src="js/games/roulette.js"></script>
  <script src="js/games/blackjack.js"></script>
  <script src="js/games/slots.js"></script>
  <script src="js/games/crash.js"></script>
  <script src="js/games/coinflip.js"></script>
  <script src="js/games/keno.js"></script>
  <script src="js/games/wheel.js"></script>
  <script src="js/games/baccarat.js"></script>
  <script src="js/games/hilo.js"></script>
  <script src="js/games/videopoker.js"></script>
  <script src="js/games/chipshop.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/friends.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
