<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f212e;
    color: #fff;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    border-radius: 16px;
    border: 1px solid #2d4a5a;
  }
  .logo { font-size: 4rem; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  h1 { font-size: 1.8rem; font-weight: 800; color: #fff; }
  .sub { color: #b1bad3; font-size: 0.9rem; margin-top: 6px; }
  .dots { margin-top: 28px; display: flex; gap: 8px; }
  .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #00e701;
    animation: bounce 0.8s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1); } }
  .version { position: absolute; bottom: 16px; color: #647a8a; font-size: 0.75rem; }
</style>
</head>
<body>
  <div class="logo">🎰</div>
  <h1>Casino Aurelius</h1>
  <div class="sub">Starting server…</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
